<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REST API Simulation CRUD</title>
    <style>
        body { 
        color: blue; 
        background-color: aqua;
        font-family: sans-serif;
        max-width: 800px; 
        margin: 20px auto; 
        padding: 0 20px; 
        text-align: center;
        }
        form { 
        background: #f4f4f4;
        padding: 15px; 
        border-radius: 5px; 
        margin-bottom: 20px; 
    }
        input { 
        margin-bottom: 10px; 
        padding: 8px; 
        width: 100%; 
        box-sizing: border-box; 
    }
        button { 
        padding: 10px 15px; 
        cursor: pointer; 
        background: #007bff; 
        color: white; 
        border: none; 
        border-radius: 3px; 
    }
        button.delete { 
        background: #dc3545; 
        margin-left: 5px; 
    }
        button.edit { 
        background: #ffc107; 
        color: black; 
    }
        table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 20px; 
    }
        th, td { 
        border: 1px solid #ddd; 
        padding: 12px; 
        text-align: left; 
    }
        th { 
        background-color: #007bff; 
        color: white; 
    }
    </style>
</head>
<body>

    <h2>Record Management</h2>
    
    <!-- Form for Insert/Update -->
    <form id="recordForm">
        <input type="hidden" id="recordId">
        <label>Title (Text):</label>
        <input type="text" id="title" required placeholder="Enter item name">
        <label>Quantity (Number):</label>
        <input type="number" id="quantity" required placeholder="Enter quantity">
        <label>Date:</label>
        <input type="date" id="date" required>
        <button type="submit" id="submitBtn">Save Record</button>
        <button type="button" id="cancelBtn" style="display:none; background:#6c757d;">Cancel Edit</button>
    </form>

    <!-- Table to Display Records -->
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Quantity</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="recordTableBody"></tbody>
    </table>

    <script>
        // --- Simulated REST API Client ---
        // Maps HTTP-like methods to LocalStorage operations
        const api = {
            dbKey: 'my_app_records',
            
            // GET: Fetch all records
            getRecords() {
                return JSON.parse(localStorage.getItem(this.dbKey)) || [];
            },

            // POST: Create a new record
            postRecord(data) {
                const records = this.getRecords();
                const newRecord = { ...data, id: Date.now().toString() };
                records.push(newRecord);
                localStorage.setItem(this.dbKey, JSON.stringify(records));
                return newRecord;
            },

            // PUT: Update an existing record
            putRecord(id, updatedData) {
                const records = this.getRecords();
                const index = records.findIndex(r => r.id === id);
                if (index !== -1) {
                    records[index] = { ...updatedData, id };
                    localStorage.setItem(this.dbKey, JSON.stringify(records));
                    return records[index];
                }
            },

            // DELETE: Remove a record
            deleteRecord(id) {
                const records = this.getRecords().filter(r => r.id !== id);
                localStorage.setItem(this.dbKey, JSON.stringify(records));
            }
        };

        // --- UI Controller ---
        const form = document.getElementById('recordForm');
        const tableBody = document.getElementById('recordTableBody');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // Render data to table after every action
        function renderRecords() {
            const records = api.getRecords();
            tableBody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.title}</td>
                    <td>${record.quantity}</td>
                    <td>${record.date}</td>
                    <td>
                        <button class="edit" onclick="editRecord('${record.id}')">Edit</button>
                        <button class="delete" onclick="deleteRecord('${record.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // Handle Form Submission (Insert or Update)
        form.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('recordId').value;
            const data = {
                title: document.getElementById('title').value,
                quantity: document.getElementById('quantity').value,
                date: document.getElementById('date').value
            };

            if (id) {
                api.putRecord(id, data); // UPDATE
            } else {
                api.postRecord(data);    // INSERT
            }

            resetForm();
            renderRecords(); // DISPLAY CURRENT RECORDS
        };

        window.deleteRecord = (id) => {
            if(confirm('Delete this record?')) {
                api.deleteRecord(id);
                renderRecords(); // DISPLAY CURRENT RECORDS
            }
        };

        window.editRecord = (id) => {
            const record = api.getRecords().find(r => r.id === id);
            document.getElementById('recordId').value = record.id;
            document.getElementById('title').value = record.title;
            document.getElementById('quantity').value = record.quantity;
            document.getElementById('date').value = record.date;
            
            submitBtn.textContent = 'Update Record';
            cancelBtn.style.display = 'inline-block';
        };

        function resetForm() {
            form.reset();
            document.getElementById('recordId').value = '';
            submitBtn.textContent = 'Save Record';
            cancelBtn.style.display = 'none';
        }

        cancelBtn.onclick = resetForm;

        // Initial Load
        renderRecords();
    </script>
</body>
</html>
