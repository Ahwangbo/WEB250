<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLite-like CRUD Application</title>
    <style>
        body { 
        color: blue; 
        background-color: aqua;
        font-family: sans-serif; 
        margin: 20px; 
        margin: 20px;
        text-align: center;
    }
        .container { 
        max-width: 800px; 
        margin: auto; 
        }
        .form-container { 
        margin-bottom: 20px; 
        padding: 15px; 
        border: 1px solid #ccc; 
        border-radius: 5px; 
        }
        input, button { 
        padding: 8px; 
        margin-top: 5px; 
        }
        table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 20px; 
        }
        th, td { 
        border: 1px solid #ccc; 
        padding: 10px; 
        text-align: left; 
        }
        .actions button { 
        margin-right: 5px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>

        <!-- Form for Insert/Update -->
        <div class="form-container">
            <h2>Add/Update Task</h2>
            <input type="hidden" id="taskId">
            <input type="text" id="taskText" placeholder="Enter task description" required>
            <input type="number" id="taskPriority" placeholder="Priority (1-10)" min="1" max="10" required>
            <input type="date" id="taskDueDate" required>
            <button onclick="saveTask()">Save Record</button>
            <button onclick="clearForm()">Cancel Update</button>
        </div>

        <!-- Display Records -->
        <h2>Current Records</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task Description (TEXT)</th>
                    <th>Priority (NUMBER)</th>
                    <th>Due Date (DATE)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="recordTableBody">
                <!-- Records will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        // Use localStorage to simulate a persistent database for this client-side example
        const DB_KEY = 'tasksDB';
        let records = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let currentId = records.length > 0 ? Math.max(...records.map(r => r.id)) + 1 : 1;

        function saveToDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(records));
            displayRecords();
        }

        function clearForm() {
            document.getElementById('taskId').value = '';
            document.getElementById('taskText').value = '';
            document.getElementById('taskPriority').value = '';
            document.getElementById('taskDueDate').value = '';
        }

        // INSERT and UPDATE operation
        function saveTask() {
            const id = document.getElementById('taskId').value;
            const text = document.getElementById('taskText').value;
            const priority = parseInt(document.getElementById('taskPriority').value);
            const dueDate = document.getElementById('taskDueDate').value;

            if (!text || !priority || !dueDate) {
                alert('Please fill in all fields.');
                return;
            }

            if (id) {
                // Update existing record
                const index = records.findIndex(r => r.id == id);
                if (index !== -1) {
                    records[index].text = text;
                    records[index].priority = priority;
                    records[index].dueDate = dueDate;
                }
            } else {
                // Insert new record
                records.push({
                    id: currentId++,
                    text: text,
                    priority: priority,
                    dueDate: dueDate
                });
            }
            saveToDB();
            clearForm();
        }

        // DELETE operation
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this record?')) {
                records = records.filter(r => r.id !== id);
                saveToDB();
            }
        }

        // READ operation and display
        function displayRecords() {
            const tbody = document.getElementById('recordTableBody');
            tbody.innerHTML = '';
            records.sort((a, b) => a.id - b.id).forEach(record => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${record.id}</td>
                    <td>${record.text}</td>
                    <td>${record.priority}</td>
                    <td>${record.dueDate}</td>
                    <td class="actions">
                        <button onclick="editTask(${record.id})">Edit</button>
                        <button onclick="deleteTask(${record.id})">Delete</button>
                    </td>
                `;
            });
        }

        // Helper function to load data into the form for editing
        function editTask(id) {
            const record = records.find(r => r.id === id);
            if (record) {
                document.getElementById('taskId').value = record.id;
                document.getElementById('taskText').value = record.text;
                document.getElementById('taskPriority').value = record.priority;
                document.getElementById('taskDueDate').value = record.dueDate;
            }
        }

        // Initial display when the page loads
        displayRecords();
    </script>
</body>
</html>
