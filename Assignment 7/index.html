<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Data Analyzer</title>
    <style>
        body {  
        color: blue; 
        background-color: aqua; 
        font-family: sans-serif; 
        margin: 20px; 
        text-align: center;
    }
        table { 
        border-collapse: collapse; 
        width: 100%; 
        margin-top: 20px; 
    }
        th, td { 
        border: 1px solid #ddd; 
        padding: 8px; 
        text-align: left; 
    }
        th { 
        background-color: #f2f2f2; 
    }
        .category-5 { background-color: #ff0000; color: white; }
        .category-4 { background-color: #ff7f00; }
        .category-3 { background-color: #ffbf00; }
        .category-2 { background-color: #ffff00; }
        .category-1 { background-color: #bfff00; }
        .tropical-storm { background-color: #00ffff; }
        .tropical-depression { background-color: #007fff; color: white; }
        #message { color: green; margin-top: 10px; }
        #error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Storm Data Analyzer</h1>
    <input type="file" id="csvFile" accept=".csv">
    <div id="message"></div>
    <div id="error"></div>
    
    <table id="stormTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Wind (km/h)</th>
                <th>Wind (mph)</th>
                <th>Saffir-Simpson Category</th>
            </tr>
        </thead>
        <tbody id="stormTableBody">
            <!-- Data will be inserted here -->
        </tbody>
    </table>

    <script>
        document.getElementById('csvFile').addEventListener('change', handleFileSelect);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const contents = e.target.result;
                processData(contents);
            };
            reader.readAsText(file);
        }

        function processData(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const storms = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                if (values.length === headers.length) {
                    const storm = {
                        date: values[0].trim(),
                        name: values[1].trim(),
                        // Parse wind speed as a number
                        maxSustainedWind_kph: parseFloat(values[2].trim())
                    };
                    storms.push(storm);
                }
            }

            // Sort storms by intensity (kph) in decreasing order
            storms.sort((a, b) => b.maxSustainedWind_kph - a.maxSustainedWind_kph);

            displayData(storms);
        }

        function convertKmhToMph(kph) {
            // Conversion factor: 1 kph ≈ 0.621371 mph
            return kph * 0.621371;
        }

        function getSaffirSimpsonCategory(mph) {
            if (mph >= 157) return { category: 'Category 5', class: 'category-5' };
            if (mph >= 130) return { category: 'Category 4', class: 'category-4' };
            if (mph >= 111) return { category: 'Category 3', class: 'category-3' };
            if (mph >= 96) return { category: 'Category 2', class: 'category-2' };
            if (mph >= 74) return { category: 'Category 1', class: 'category-1' };
            if (mph >= 39) return { category: 'Tropical Storm', class: 'tropical-storm' };
            return { category: 'Tropical Depression', class: 'tropical-depression' };
        }

        function displayData(storms) {
            const tableBody = document.getElementById('stormTableBody');
            tableBody.innerHTML = ''; // Clear previous data

            storms.forEach(storm => {
                const mph = convertKmhToMph(storm.maxSustainedWind_kph);
                const categoryInfo = getSaffirSimpsonCategory(mph);

                const row = tableBody.insertRow();
                row.classList.add(categoryInfo.class);

                row.insertCell().textContent = storm.date;
                row.insertCell().textContent = storm.name;
                row.insertCell().textContent = storm.maxSustainedWind_kph.toFixed(0);
                row.insertCell().textContent = mph.toFixed(1);
                row.insertCell().textContent = categoryInfo.category;
            });

            document.getElementById('message').textContent = `Data loaded and sorted for ${storms.length} storms.`;
        }
    </script>
</body>
</html>
