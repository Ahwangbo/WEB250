<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Data Processor</title>
    <style>
        body {
        color: blue;
		background-color: aqua;
        font-family: sans-serif;
        margin: 20px;
         padding: 20px; 
        text-align: center;
        }
        input[type="file"] {
            margin-bottom: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            cursor: pointer;
        }
        .category-TS { background-color: #add8e6; } /* Light Blue for Tropical Storm */
        .category-1 { background-color: #ffff99; } /* Light Yellow for Cat 1 */
        .category-2 { background-color: #ffdd55; } /* Yellow-Orange for Cat 2 */
        .category-3 { background-color: #ff9933; } /* Orange for Cat 3 (Major) */
        .category-4 { background-color: #ff5555; } /* Red for Cat 4 (Major) */
        .category-5 { background-color: #ff0000; } /* Bright Red for Cat 5 (Major) */
        .category-NR { background-color: #cccccc; } /* Grey for Not Rated/Other */
    </style>
</head>
<body>

    <h2>Upload Storm Data CSV</h2>
    <input type="file" id="csvFile" accept=".csv">
    
    <table id="stormTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Storm Name</th>
                <th onclick="sortTableByKph()">Max Sustained Winds (km/h) ↓</th>
                <th>Max Sustained Winds (mph)</th>
                <th>Saffir-Simpson Category</th>
            </tr>
        </thead>
        <tbody id="stormTableBody">
            <!-- Data will be inserted here -->
        </tbody>
    </table>

    <script>
        const KPH_TO_MPH_FACTOR = 0.621371;
        let allStormData = [];

        document.getElementById('csvFile').addEventListener('change', handleFileSelect, false);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const contents = e.target.result;
                processCSV(contents);
            };
            reader.readAsText(file);
        }

        function processCSV(csvText) {
            const lines = csvText.trim().split('\n');
            // Assuming the first line is header
            const dataLines = lines.slice(1);
            allStormData = dataLines.map(line => {
                const [date, name, kph] = line.split(',');
                const kphValue = parseFloat(kph);
                const mphValue = kphValue * KPH_TO_MPH_FACTOR;
                const category = getSaffirSimpsonCategory(mphValue);
                return {
                    date,
                    name,
                    kph: kphValue,
                    mph: mphValue.toFixed(2),
                    category
                };
            });

            displayData(allStormData);
        }

        function getSaffirSimpsonCategory(mph) {
            if (mph >= 157) return '5';
            if (mph >= 130) return '4';
            if (mph >= 111) return '3';
            if (mph >= 96) return '2';
            if (mph >= 74) return '1';
            if (mph >= 39) return 'TS'; // Tropical Storm
            return 'NR'; // Not Rated / Tropical Depression
        }

        function displayData(storms) {
            const tbody = document.getElementById('stormTableBody');
            tbody.innerHTML = '';
            storms.forEach(storm => {
                const row = document.createElement('tr');
                // Use a class name for CSS color coding. 
                // Need to handle 'TS' and 'NR' for valid class names
                const categoryClass = `category-${storm.category.replace('>', '')}`; 
                row.classList.add(categoryClass);

                row.innerHTML = `
                    <td>${storm.date}</td>
                    <td>${storm.name}</td>
                    <td>${storm.kph.toFixed(2)}</td>
                    <td>${storm.mph}</td>
                    <td>${storm.category}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function sortTableByKph() {
            allStormData.sort((a, b) => b.kph - a.kph);
            displayData(allStormData);
        }
    </script>
</body>
</html>
